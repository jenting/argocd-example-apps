apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 1. Point to your existing deployment file
resources:
  - guestbook-ui-deployment.yaml

# 2. Define the overwrite (Strategic Merge Patch)
patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: guestbook-ui
      spec:
        replicas: 2
